<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Modern Freelancer Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── LIGHT / DARK TOKENS ───────────────────────────────── */
    :root {
      --bg:          #FAF8F5;
      --bg-card:     #FFFFFF;
      --bg-elevated: #F4F1EC;
      --text:        #1A1916;
      --muted:       #7A7066;
      --faint:       #BDB7AF;
      --border:      #E8E2DA;
      --accent:      #B87A0A;
      --accent-h:    #9A6408;
      --overlay:     rgba(26,25,22,0.55);
      --shadow-card: 0 2px 12px rgba(26,25,22,0.06);
      --shadow-hover: 0 8px 32px rgba(26,25,22,0.12);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'Source Serif 4', Georgia, serif;
      --font-ui:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    [data-theme="dark"] {
      --bg:          #111110;
      --bg-card:     #1C1B19;
      --bg-elevated: #242320;
      --text:        #F0EDE8;
      --muted:       #8A857D;
      --faint:       #4A4740;
      --border:      #2E2C29;
      --accent:      #D49A20;
      --accent-h:    #E8AD30;
      --overlay:     rgba(10,10,8,0.70);
      --shadow-card: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ── BASE ─────────────────────────────────────────────── */
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); font-size: 17px; line-height: 1.75;
      min-height: 100vh; transition: background 0.25s, color 0.25s;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
    input { font-family: inherit; color: inherit; }
    #root { min-height: 100vh; display: flex; flex-direction: column; }
    ::selection { background: rgba(184,122,10,0.18); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }

    /* ── CATEGORY COLORS ─────────────────────────────────── */
    .badge-graphic-design  { color: #5B30A6; background: #EDE7FB; }
    .badge-content-writing { color: #1A6B44; background: #E4F4EC; }
    .badge-video-editing   { color: #B82020; background: #FBEAEA; }
    .badge-social-media    { color: #1056A0; background: #E4EFF9; }
    [data-theme="dark"] .badge-graphic-design  { color: #C4A8FF; background: rgba(91,48,166,0.25); }
    [data-theme="dark"] .badge-content-writing { color: #6FE0A0; background: rgba(26,107,68,0.25); }
    [data-theme="dark"] .badge-video-editing   { color: #FF9090; background: rgba(184,32,32,0.25); }
    [data-theme="dark"] .badge-social-media    { color: #80C4FF; background: rgba(16,86,160,0.25); }
    .dot-graphic-design  { background: #7B50C8; }
    .dot-content-writing { background: #22844F; }
    .dot-video-editing   { background: #CC2A2A; }
    .dot-social-media    { background: #1868C0; }

    /* ── READING PROGRESS BAR ────────────────────────────── */
    .progress-bar {
      position: fixed; top: 0; left: 0; z-index: 300;
      height: 3px; background: var(--accent);
      transition: width 0.08s linear;
      pointer-events: none;
    }

    /* ── NAVBAR ──────────────────────────────────────────── */
    .navbar {
      position: sticky; top: 0; z-index: 200;
      background: rgba(250,248,245,0.92);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      transition: background 0.25s, border-color 0.25s;
    }
    [data-theme="dark"] .navbar { background: rgba(17,17,16,0.92); }
    .navbar-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 0 24px; height: 62px;
      display: flex; align-items: center; gap: 0;
    }
    .logo {
      font-family: var(--font-display); font-size: 1.1rem; font-weight: 700;
      letter-spacing: -0.01em; color: var(--text); white-space: nowrap; flex-shrink: 0;
    }
    .logo span { color: var(--accent); }
    .nav-links {
      display: flex; align-items: center; margin-left: 28px; flex: 1;
    }
    .nav-link {
      font-family: var(--font-ui); font-size: 13px; font-weight: 500;
      color: var(--muted); padding: 6px 11px; border-radius: 6px;
      transition: color 0.15s, background 0.15s; white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); background: var(--bg-elevated); }
    .nav-link.active { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 8px;
      color: var(--muted); transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { color: var(--text); background: var(--bg-elevated); }
    .search-trigger {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-ui); font-size: 13px; font-weight: 500;
      color: var(--muted); padding: 7px 12px;
      border-radius: 8px; border: 1px solid var(--border);
      transition: all 0.15s; white-space: nowrap;
    }
    .search-trigger:hover { color: var(--text); border-color: var(--faint); }
    .search-kbd {
      font-size: 11px; color: var(--faint); background: var(--bg-elevated);
      padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border);
      font-family: var(--font-ui);
    }
    .hamburger { display: none; }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .search-trigger .search-kbd { display: none; }
      .hamburger { display: flex; }
    }

    /* ── MOBILE DRAWER ───────────────────────────────────── */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 250;
      background: var(--overlay); backdrop-filter: blur(2px);
    }
    .drawer {
      position: fixed; top: 0; right: 0; z-index: 260;
      width: min(300px, 85vw); height: 100vh;
      background: var(--bg-card); border-left: 1px solid var(--border);
      padding: 24px 20px; display: flex; flex-direction: column; gap: 0;
      transform: translateX(100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .drawer-logo { font-family: var(--font-display); font-size: 1rem; font-weight: 700; }
    .drawer-logo span { color: var(--accent); }
    .drawer-link {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-ui); font-size: 15px; font-weight: 500;
      color: var(--muted); padding: 12px 8px;
      border-bottom: 1px solid var(--border);
      transition: color 0.15s;
    }
    .drawer-link:hover { color: var(--text); }
    .drawer-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── SEARCH OVERLAY ──────────────────────────────────── */
    .search-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: var(--overlay); backdrop-filter: blur(4px);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 72px;
    }
    .search-box {
      background: var(--bg-card); border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.22);
      width: 100%; max-width: 600px; margin: 0 20px;
      border: 1px solid var(--border); overflow: hidden;
    }
    .search-input-row {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .search-input-row svg { color: var(--faint); flex-shrink: 0; }
    .search-input-row input {
      flex: 1; border: none; outline: none; background: transparent;
      font-family: var(--font-body); font-size: 17px; color: var(--text);
    }
    .search-input-row input::placeholder { color: var(--faint); }
    .search-results { padding: 8px 0; max-height: 380px; overflow-y: auto; }
    .search-result-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 12px 20px; cursor: pointer; transition: background 0.1s;
    }
    .search-result-item:hover, .search-result-item.focused { background: var(--bg-elevated); }
    .search-result-thumb {
      width: 52px; height: 40px; border-radius: 6px;
      object-fit: cover; flex-shrink: 0;
    }
    .search-result-text { flex: 1; }
    .search-result-title { font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 3px; }
    .search-result-meta { font-family: var(--font-ui); font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .search-empty { padding: 28px 20px; color: var(--muted); font-family: var(--font-ui); font-size: 14px; text-align: center; }
    .search-hint { padding: 10px 20px 14px; font-family: var(--font-ui); font-size: 12px; color: var(--faint); text-align: center; }

    /* ── HERO ────────────────────────────────────────────── */
    .hero-wrap { max-width: 1200px; margin: 0 auto; padding: 40px 24px 0; }
    .hero-card {
      border-radius: 18px; overflow: hidden;
      position: relative; cursor: pointer;
      background: #1A1916;
    }
    .hero-img {
      width: 100%; height: clamp(340px, 50vw, 520px);
      object-fit: cover; display: block; opacity: 0.72;
      transition: opacity 0.3s, transform 0.5s;
    }
    .hero-card:hover .hero-img { opacity: 0.6; transform: scale(1.02); }
    .hero-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: clamp(24px, 5vw, 52px);
      background: linear-gradient(to top, rgba(15,14,12,0.92) 0%, rgba(15,14,12,0.4) 60%, transparent 100%);
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 4px; margin-bottom: 14px;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3.5vw, 2.5rem);
      font-weight: 700; line-height: 1.18; letter-spacing: -0.02em;
      color: #FFFFFF; margin-bottom: 12px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .hero-excerpt {
      font-size: clamp(0.9rem, 1.5vw, 1.05rem);
      color: rgba(255,255,255,0.78); line-height: 1.6;
      margin-bottom: 16px;
      max-width: 600px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .hero-meta {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,0.6);
    }
    .hero-meta .dot { opacity: 0.4; }

    /* ── FILTER CHIPS ────────────────────────────────────── */
    .filter-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 24px 0; }
    .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .filter-scroll::-webkit-scrollbar { height: 0; }
    .chip {
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
      font-family: var(--font-ui); font-size: 13px; font-weight: 500;
      padding: 8px 16px; border-radius: 24px;
      border: 1.5px solid var(--border);
      color: var(--muted); background: var(--bg-card);
      transition: all 0.18s; cursor: pointer;
    }
    .chip:hover { border-color: var(--faint); color: var(--text); }
    .chip.active { border-color: transparent; color: #fff; }
    .chip-dot { width: 7px; height: 7px; border-radius: 50%; }
    .chip.active-all { background: var(--text); color: var(--bg); }
    .chip.active-graphic-design  { background: #7B50C8; }
    .chip.active-content-writing { background: #22844F; }
    .chip.active-video-editing   { background: #CC2A2A; }
    .chip.active-social-media    { background: #1868C0; }

    /* ── SECTION DIVIDER ─────────────────────────────────── */
    .section-divider {
      max-width: 1200px; margin: 32px auto 0; padding: 0 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .section-divider-label {
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--faint); white-space: nowrap;
    }
    .section-divider-line { flex: 1; height: 1px; background: var(--border); }
    .section-divider-count { font-family: var(--font-ui); font-size: 11px; color: var(--faint); white-space: nowrap; }

    /* ── POST CARDS GRID ─────────────────────────────────── */
    .posts-wrap { max-width: 1200px; margin: 0 auto; padding: 24px 24px 72px; }
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    @media (max-width: 680px) { .posts-grid { grid-template-columns: 1fr; } }

    .post-card {
      background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s;
      display: flex; flex-direction: column;
    }
    .post-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: var(--faint);
    }
    .card-img-wrap { position: relative; overflow: hidden; height: 200px; flex-shrink: 0; }
    .card-img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.5s ease;
    }
    .post-card:hover .card-img { transform: scale(1.05); }
    .card-img-badge {
      position: absolute; top: 12px; left: 12px;
      font-family: var(--font-ui); font-size: 10px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 4px 9px; border-radius: 4px;
    }
    .card-body { padding: 20px 20px 18px; flex: 1; display: flex; flex-direction: column; }
    .card-title {
      font-family: var(--font-display); font-size: 1.1rem; font-weight: 600;
      line-height: 1.3; letter-spacing: -0.01em;
      color: var(--text); margin-bottom: 8px; flex: 1;
    }
    .card-excerpt { font-size: 13.5px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
    .card-meta {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-ui); font-size: 12px; color: var(--faint);
      border-top: 1px solid var(--border); padding-top: 14px; margin-top: auto;
    }
    .card-meta-dot { color: var(--border); }

    /* ── CAT PAGE ────────────────────────────────────────── */
    .cat-page { max-width: 1200px; margin: 0 auto; padding: 48px 24px 72px; }
    .cat-page-header {
      display: flex; align-items: flex-start; gap: 24px;
      margin-bottom: 40px; padding-bottom: 32px; border-bottom: 1px solid var(--border);
    }
    .cat-page-color-bar { width: 4px; border-radius: 2px; align-self: stretch; flex-shrink: 0; }
    .cat-page-eyebrow {
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .cat-page-title {
      font-family: var(--font-display); font-size: 2rem; font-weight: 700;
      color: var(--text); margin-bottom: 8px; letter-spacing: -0.015em;
    }
    .cat-page-desc { font-size: 1rem; color: var(--muted); }
    .back-btn {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--font-ui); font-size: 13px; font-weight: 500;
      color: var(--muted); padding: 8px 14px;
      border: 1px solid var(--border); border-radius: 8px;
      transition: all 0.15s; margin-bottom: 32px;
    }
    .back-btn:hover { color: var(--text); border-color: var(--faint); background: var(--bg-elevated); }

    /* ── POST PAGE ───────────────────────────────────────── */
    .post-page { max-width: 1200px; margin: 0 auto; padding: 36px 24px 80px; }
    .post-layout {
      display: grid; grid-template-columns: 1fr 320px;
      gap: 60px; align-items: start;
    }
    @media (max-width: 880px) { .post-layout { grid-template-columns: 1fr; } }

    .post-hero-img {
      width: 100%; height: 420px; object-fit: cover;
      border-radius: 14px; margin-bottom: 36px; display: block;
    }
    @media (max-width: 600px) { .post-hero-img { height: 240px; border-radius: 10px; } }

    .post-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 4px 9px; border-radius: 4px; margin-bottom: 18px;
    }
    .post-title {
      font-family: var(--font-display);
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      font-weight: 700; line-height: 1.15;
      letter-spacing: -0.02em; color: var(--text); margin-bottom: 20px;
    }
    .post-meta {
      display: flex; align-items: center; gap: 14px;
      font-family: var(--font-ui); font-size: 13px; color: var(--muted);
      margin-bottom: 36px; padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
    .author-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #F0E8D5; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--accent);
      flex-shrink: 0;
    }
    [data-theme="dark"] .author-avatar { background: #2D2820; }
    .post-body {
      font-size: 17.5px; line-height: 1.82; color: var(--text);
      max-width: 68ch;
    }
    .post-body p { margin-bottom: 1.5em; }
    .post-body h2 {
      font-family: var(--font-display); font-size: 1.5rem; font-weight: 700;
      color: var(--text); margin: 2.2em 0 0.7em; letter-spacing: -0.01em;
      padding-bottom: 0.4em; border-bottom: 1px solid var(--border);
    }
    .post-body h3 {
      font-family: var(--font-display); font-size: 1.2rem; font-weight: 600;
      color: var(--text); margin: 1.8em 0 0.5em;
    }
    .post-body strong { font-weight: 600; color: var(--text); }
    .post-body em { font-style: italic; }
    .post-body ul, .post-body ol { margin: 0 0 1.5em 1.6em; }
    .post-body li { margin-bottom: 0.55em; }
    .post-body blockquote {
      border-left: 3px solid var(--accent); padding: 4px 0 4px 20px;
      margin: 2em 0; font-style: italic; color: var(--muted);
      font-size: 1.08rem; line-height: 1.7;
    }
    .post-body hr { border: none; border-top: 1px solid var(--border); margin: 2.5em 0; }

    /* Sidebar */
    .post-sidebar { position: sticky; top: 80px; display: flex; flex-direction: column; gap: 18px; }
    .sidebar-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
    }
    .sidebar-card-label {
      font-family: var(--font-ui); font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint);
      margin-bottom: 14px;
    }
    .related-item {
      display: flex; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s;
    }
    .related-item:last-child { border-bottom: none; }
    .related-item:hover { opacity: 0.7; }
    .related-thumb {
      width: 56px; height: 44px; border-radius: 6px;
      object-fit: cover; flex-shrink: 0;
    }
    .related-title { font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 3px; }
    .related-meta { font-family: var(--font-ui); font-size: 11px; color: var(--faint); }
    .sidebar-about-text { font-size: 14px; color: var(--muted); line-height: 1.65; }

    /* ── ABOUT PAGE ──────────────────────────────────────── */
    .about-page { max-width: 860px; margin: 0 auto; padding: 52px 24px 80px; }
    .about-hero { text-align: center; margin-bottom: 52px; }
    .about-logo { font-family: var(--font-display); font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
    .about-logo span { color: var(--accent); }
    .about-tagline { font-size: 1.05rem; color: var(--muted); max-width: 500px; margin: 0 auto; line-height: 1.65; }
    .identity-banner {
      background: rgba(184,122,10,0.08); border: 1px solid rgba(184,122,10,0.25);
      border-radius: 10px; padding: 16px 20px; margin-bottom: 48px;
      font-family: var(--font-ui); font-size: 13px; color: var(--muted); line-height: 1.6;
    }
    .about-sec-label {
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--faint); margin-bottom: 16px;
    }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 48px; }
    @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
    .info-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }

    id:1, category:"graphic-design", featured:true,
    title:"How I Made My First ₹10,000 Selling Templates — Without a Single Client",
    excerpt:"I kept waiting to feel 'ready'. Three months later I finally just started. The first sale came in on a random Tuesday.",
    date:"April 1, 2026", readTime:"7 min",
    image: img("1626785774573-4b799315d085"),
    content:`The first thing nobody tells you about selling design templates is that you'll spend more time on your product listings than on the actual designs.

I learned this the hard way. I made 14 Instagram templates in one weekend — honestly pretty decent work — uploaded them to Creative Market with blurry screenshots and a description that said something like "modern social media templates, perfect for brands." Three weeks later, zero sales.

The problem wasn't the designs.

I knew this because I'd posted the same templates as free downloads in a couple of Facebook groups and got over 200 downloads in 48 hours. People wanted the templates. My listing just didn't give them a reason to pay for them.

## What actually changed things

I spent a day studying the top-selling template shops on Creative Market. Not to copy them — just to understand what they were doing. The answer was pretty boring: good mockup images and specific product descriptions.

"14 Instagram post templates for food bloggers and recipe creators" beats "social media templates for brands" every single time. Because the food blogger searching Creative Market already knows she's a food blogger. She doesn't need to decide whether the product applies to her — your title has already confirmed it does.

I rewrote all my listings. I took proper screenshots of the templates on a fake Instagram grid I set up in Figma. I repriced them from ₹299 to ₹799 — which sounds counterintuitive, but lower-priced templates often get skipped because buyers assume they're lower quality.

The first sale came in on a Tuesday, 11 days after relisting. ₹799. I remember sitting there refreshing my email.

By the end of that month, I had ₹10,400 in sales from six template packs.

## The tools I actually used

Everything was Canva Pro, not Photoshop or Illustrator. I know that raises eyebrows in design communities, but for selling editable templates, Canva-compatible files are actually a selling point. Most people buying templates plan to customize them in Canva anyway. Meeting them where they are isn't cutting corners — it's just smart product design.

My process: pick a specific audience, look at what content they actually post, design templates that solve their specific problems. Wedding photographers, for example, hate designing quote posts. They want clean text layouts that don't feel like Canva defaults but also don't require design knowledge to customize. That's a real, specific pain point.

## The part nobody talks about

Passive income from templates is real but slow to build. That first ₹10,000 month dropped to ₹4,000 the following month because I wasn't adding new packs. The shops making consistent money are uploading something new every one or two weeks, building a catalog, and benefiting from compounding discovery.

I'm at 22 packs now. Some months it's ₹6,000, some months it's ₹20,000. Inconsistent, but also not zero, and the work is already done.

If I were starting again, I'd do three things differently: niche down harder from the start, invest more time in mockup photography, and I'd start on Etsy before Creative Market — the organic traffic is genuinely better for new sellers.

That's it. No secret formula. Just better listings and a narrow enough niche to be found.`

    title:"The Canva Pro Mistake That Almost Cost Me a Client",
    excerpt:"Turns out 'share a link' and 'export for print' are not the same thing. A story about learning this at the worst possible moment.",
    date:"March 24, 2026", readTime:"4 min",
    image: img("1572044162444-ad60f128bdea"),
    content:`A short one, but I think about this every time I'm about to deliver a file.

I designed a flyer for a small boutique. Looked great on screen. The client was happy with the mockup. I sent her the Canva share link and told her she could download it from there.

She took it to a print shop. The print shop printed it at 72 DPI because that's what the downloaded PNG defaulted to. The flyer came out blurry. 300 of them.

She was not thrilled.

The fix was simple and I should have known: export as PDF (Print) from Canva — not PNG, not the share link, not the standard PDF. The print PDF option outputs at 300 DPI with proper color settings. That's the file print shops need.

I remade the flyer, covered the reprint cost, and added a "client handoff checklist" to my process that I now use for every project. It has things like: is this going to print? Use PDF (Print). Does the client need editable files? Export as PPTX and walk them through opening it. Are there brand fonts in use? Embed or outline them before export.

    id:5, category:"content-writing", featured:true,
    title:"SEO Writing Pays Bills. Copywriting Builds Wealth. Here's the Difference.",
    excerpt:"After 300+ SEO articles, I switched to sales copywriting. My income doubled in 90 days. This is what actually changed.",
    date:"March 31, 2026", readTime:"8 min",
    image: img("1455390582262-044cdead277a"),
    content:`Let me be direct: SEO writing is a good way to start. It is not a great place to stay.

I spent 14 months writing SEO articles. The money was okay — I averaged around ₹2.50 per word after a few months, which sounds reasonable until you calculate it. A solid 1,000-word article takes me about 3 hours from research to final edit. That's ₹2,500 for 3 hours of focused work. Fine, not remarkable.

SEO writing is also increasingly commoditized. There are thousands of competent writers, and AI has pushed the floor further down — clients who were paying ₹2/word now want me to polish AI drafts for ₹0.50/word. I'm not interested in that trade.

## What copywriting actually is

"Copywriting" sounds like something from a 1960s ad agency, but in practice it just means writing designed to make someone take a specific action: sign up, buy, click, book a call. And businesses pay dramatically more for this than for blog content, for a simple reason.

The ROI is traceable.

If I write an email sequence for an e-commerce brand and it generates ₹8 lakh in sales, paying me ₹40,000 for that work is an obvious business decision. The connection between my work and their revenue is direct and measurable.

## How I made the switch

I didn't do a ₹15,000 copywriting course. I read about 40 sales pages, email sequences, and landing pages that I knew were working — meaning they were from businesses actually making money, not just websites with pretty typography.

I started noticing patterns. Good copy almost always does three things: it opens with a problem the reader is already thinking about, it takes longer to get to the pitch than you'd expect, and it makes you feel understood before it makes you feel sold to.

Then I offered to rewrite a client's product page for free. I picked a client I already worked with on SEO content, wrote a new version of their highest-traffic product page, and sent it with a short note explaining what I'd changed and why.

They tested it against the original. Conversions went up 23%. They paid me ₹18,000 for a full rewrite of their other product pages — more than I'd earned from four months of their SEO work combined.

## Where to start

Study email sequences first. Not landing pages, not full sales letters. Emails.

Why emails: they're shorter, faster to test, and the demand from e-commerce brands is genuinely huge. Most online shops have abandoned email marketing to a "send a 20% coupon every week" strategy, and they know it isn't working. A freelancer who can write a proper welcome sequence, a cart abandonment flow, a post-purchase sequence — that's a real, specific, well-paid skill.

SEO writing got me started. I don't regret a day of it. But copywriting is where the leverage is.`

    title:"Writing for a Niche You Know Nothing About",
    excerpt:"My most profitable writing niche is industrial HVAC equipment. A year ago I didn't know what HVAC stood for.",
    date:"March 23, 2026", readTime:"5 min",
    image: img("1471107340929-a87cd0f5b5f3"),
    content:`People get stuck on niche selection because they think you need to write about things you already know. You don't. You need to be good at figuring things out quickly, asking the right questions, and writing clearly about complex topics.

I write primarily for an industrial equipment company now. Their products are commercial HVAC systems — the kind that go in hospitals, data centers, large commercial buildings. I had zero background in this. My first week I was Googling terms I'd never heard and feeling like I was reading a foreign language.

Twelve months later, I understand the product line well enough to spot errors in the technical briefs their engineers send me. I've learned what questions to ask, who to ask them to, and where the gaps are in their existing content. The work is genuinely interesting now, partly because I had to learn it.

## The actual research process

For any unfamiliar topic, I do three things before writing a word:

1. Read the company's existing content to understand their voice and where they are in their thinking
2. Find the two or three most respected publications or communities in that industry — trade journals, Reddit communities, LinkedIn groups — and read a week's worth of content
3. Talk to someone who works in the field. Even a 20-minute conversation teaches you more than three hours of reading

Then I write, and I write with the assumption that I'll have questions mid-draft that I'll need to send back to the client. That's normal and clients respect it.

The niche you know nothing about today can become the niche you're paid to know in six months. The research process is the skill. The topic is just material.`

    id:9, category:"video-editing", featured:true,
    title:"Short-Form Video is a Gold Rush. Here's How I Got In.",
    excerpt:"I was editing YouTube vlogs for ₹5,000 a video. A client asked me to cut some Reels. My rate tripled in three weeks.",
    date:"March 30, 2026", readTime:"7 min",
    image: img("1574717024653-61fd2cf4d44d"),
    content:`This is a specific story about a specific moment — but the pattern shows up everywhere, so stay with it.

I was editing long-form YouTube content. Not badly — my work was good, my clients were happy. But the economics were modest. ₹5,000 to ₹8,000 per video, three or four videos a month, somewhere around ₹20,000 a month total. Enough to take seriously, not enough to rearrange your life around.

The short-form thing happened by accident. A client who makes cooking videos asked if I could cut some Reels from his existing footage. Sure, I said. How different could it be?

Quite different, as it turned out.

## The actual skill difference

Long-form editing is about pacing and storytelling. You're guiding someone through a 10-to-20-minute journey and your cuts need to feel natural. A 5-second establishing shot is fine. Breathing room is part of the craft.

Short-form editing is about hooks and retention. You have roughly two seconds to stop a thumb from scrolling. Everything after that first hook is about earning the next three seconds, then the three after that. The decision-making is almost opposite.

## Why the rates are better

A single well-performing Reel can drive more business for a client than five mediocre YouTube videos. Clients figured this out before editors did, which is partly why demand exploded.

I was initially pricing short-form low because I assumed less runtime meant less value. My first Reel packages were ₹8,000 for four Reels. Then I noticed: four Reels took me less time than one YouTube video, and clients valued them at least as much. I repriced. ₹3,500 per Reel standalone, or ₹12,000 for four. My cooking client took the four-Reel package immediately.

## Getting started if you haven't yet

The easiest entry point is repurposing existing long-form content. Most YouTubers have hours of footage they've already edited into long videos — they just don't have time to also cut short versions for Instagram and TikTok.

Don't work for free. Even ₹2,000 for a test Reel positions you as a professional rather than a favor.

Short-form editing is now about 65% of my video work. The rate is higher on average. A year ago the ratio was flipped.`

    title:"Getting Your First YouTube Client Without a Portfolio",
    excerpt:"The chicken-and-egg problem. Here's how I broke out of it without doing hours of free work.",
    date:"March 26, 2026", readTime:"5 min",
    image: img("1611162617474-5b21e879e113"),
    content:`The classic problem: you need a portfolio to get clients, but you need clients to build a portfolio.

Here's how I broke the loop without giving away dozens of hours of free work.

    content:`Per-video pricing is the default when you start out, and it works fine until you have a month where two clients go quiet and your income drops to nothing.

## What a retainer actually looks like

My current main retainer is ₹22,000/month for a fitness creator. That covers: one long-form YouTube video per week (editing, color, thumbnail), six short-form clips per month pulled from the long-form content, and a monthly planning call.

    image: img("1611162616305-c69b3fa7fbe0"),
    content:`Social media management has a reputation problem. People hear "I manage Instagram accounts for money" and picture someone posting selfies from their phone. The reality is significantly more boring, and more profitable.

## The part that's actually difficult

Content creation is not the hard part. The hard part is managing what clients expect social media to do.

    image: img("1484480974693-6ca0a78fb36b"),
    content:`The content calendars that get shared online are beautiful. They're also not what people who do this for a living actually use.

The color-coded Notion templates with content pillars, theme weeks, and engagement hooks mapped out six weeks ahead look great in screenshots. They're also often made by people who've never had to fill a content calendar for a real client with a real business whose priorities shift constantly.

## What my actual working calendar looks like

A shared Google Sheet. Three columns: date, content idea/draft, status. That's 80% of the functionality I need.

The planning happens weekly, not monthly. Every Monday I look at what's coming up for the business that week — any events, promotions, milestones, or seasonal moments — and I plan 3–4 posts around those. The remaining posts are drawn from evergreen content: things that are always relevant to their audience regardless of the date.

Planning too far ahead is a trap. When I tried to plan a client's Instagram four weeks out, half the posts were outdated or wrong by the time they went live because the business had changed course on a promotion or the news cycle had shifted. Two weeks ahead is about the right planning horizon for most small businesses.

const getCat = id => CATS.find(c => c.id === id);

function parseInline(text) {
  const parts = [];
  let remaining = text, ki = 0;
  while (remaining.length > 0) {
    const bm = remaining.match(/\*\*(.+?)\*\*/);
    const im = remaining.match(/_(.+?)_/);
    const first = bm && (!im || bm.index <= im.index) ? bm : im;
    if (!first) { parts.push(remaining); break; }
    if (first.index > 0) parts.push(remaining.slice(0, first.index));
    if (first === bm) parts.push(<strong key={ki++}>{bm[1]}</strong>);
    else parts.push(<em key={ki++}>{im[1]}</em>);
    remaining = remaining.slice(first.index + first[0].length);
  }
  return parts;
}

function renderContent(text) {
  const lines = text.trim().split("\n");
  const els = []; let key = 0;
  for (const line of lines) {
    if (line.startsWith("## ")) els.push(<h2 key={key++}>{line.slice(3)}</h2>);
    else if (line.startsWith("### ")) els.push(<h3 key={key++}>{line.slice(4)}</h3>);
    else if (line === "---") els.push(<hr key={key++} />);
    else if (line.trim() !== "") els.push(<p key={key++}>{parseInline(line)}</p>);
  }
  return els;
}

/* ─── READING PROGRESS ───────────────────────────────────── */
function ReadingProgress() {
  const [w, setW] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const el = document.documentElement;
      const scrolled = el.scrollTop || document.body.scrollTop;
      const total = el.scrollHeight - el.clientHeight;
      setW(total > 0 ? Math.min(100, (scrolled / total) * 100) : 0);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return <div className="progress-bar" style={{ width: w + "%" }} />;
}

/* ─── BACK TO TOP ────────────────────────────────────────── */
function BackToTop() {
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const onScroll = () => setVis((document.documentElement.scrollTop || document.body.scrollTop) > 400);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return (
    <button className={`back-to-top${vis ? " visible" : ""}`}
      onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
      aria-label="Back to top">
      <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
        <path d="M18 15l-6-6-6 6"/>
      </svg>
    </button>
  );
}

function SearchOverlay({ onClose, onOpenPost }) {
  const [q, setQ] = useState("");
  const [focused, setFocused] = useState(0);
  const inputRef = useRef(null);
  const results = useMemo(() => {
    if (!q.trim()) return [];
    const lq = q.toLowerCase();
    return POSTS.filter(p =>
      p.title.toLowerCase().includes(lq) ||
      p.excerpt.toLowerCase().includes(lq) ||
      getCat(p.category)?.name.toLowerCase().includes(lq)
    ).slice(0, 6);
  }, [q]);

  useEffect(() => { inputRef.current?.focus(); }, []);
  useEffect(() => { setFocused(0); }, [results]);

  const onKey = e => {
    if (e.key === "ArrowDown") { e.preventDefault(); setFocused(f => Math.min(f+1, results.length-1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setFocused(f => Math.max(f-1, 0)); }
    else if (e.key === "Enter" && results[focused]) { onOpenPost(results[focused]); onClose(); }
    else if (e.key === "Escape") onClose();
  };

  return (
    <div className="search-overlay" onClick={onClose}>
      <div className="search-box" onClick={e => e.stopPropagation()} onKeyDown={onKey}>
        <div className="search-input-row">
          <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)} placeholder="Search posts, topics, categories…" />
          <button onClick={onClose} style={{ color:"var(--faint)", fontSize:18, lineHeight:1 }}>✕</button>
        </div>
        <div className="search-results">
          {q && results.length === 0 && <div className="search-empty">No results for "{q}"</div>}
          {results.map((p, i) => (
            <div key={p.id} className={`search-result-item${i===focused?" focused":""}`}
              onMouseEnter={() => setFocused(i)}
              onClick={() => { onOpenPost(p); onClose(); }}>
              <img className="search-result-thumb" src={img(p.image.split("photo-")[1]?.split("?")[0], 80, 60)} alt="" />
              <div className="search-result-text">
                <div className="search-result-title">{p.title}</div>
                <div className="search-result-meta">
                  <span className={`post-card-badge badge-${p.category}`} style={{fontSize:10,padding:"2px 7px"}}>
                    {getCat(p.category)?.name}
                  </span>
                  <span>{p.readTime} read</span>
                </div>
              </div>
            </div>
          ))}
          {!q && <div className="search-empty">Start typing to search all 15 posts…</div>}
        </div>
        <div className="search-hint">↑ ↓ to navigate · Enter to open · Esc to close</div>
      </div>
    </div>
  );
}

      <div className="info-grid">
        {[
          ["Course", ASSIGNMENT.course],
          ["Assignment", ASSIGNMENT.assignment],
          ["Submission Deadline", ASSIGNMENT.deadline],
          ["Live URL", <a href={ASSIGNMENT.url} key="url" target="_blank">{ASSIGNMENT.url}</a>],
          ["Total Posts", "15 original posts (all dated after 15 March 2026)"],
          ["Max Marks", "20"],
        ].map(([label, value]) => (
          <div key={label} className="info-card">
            <div className="info-label">{label}</div>
            <div className="info-value">{value}</div>
          </div>
        ))}
      </div>
      <div className="about-sec-label">Group Members</div>
      <div className="team-grid">
        {TEAM.map((m, i) => (
          <div key={i} className="team-card">
            <div className="team-avatar">{m.initials}</div>
            <div className="team-name">{m.name}</div>
            <div className="team-roll">{m.roll} · {m.section}</div>
            <div className="team-contrib">Contribution: {m.contrib}</div>
          </div>
        ))}
      </div>
      <div className="about-sec-label">Content Categories</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:48}}>
        {CATS.map(c => (
          <span key={c.id} className={`post-card-badge badge-${c.id}`} style={{fontSize:13,padding:"6px 14px",borderRadius:6}}>
            {c.name}
          </span>
        ))}
      </div>
      <div className="about-sec-label">About This Blog</div>
      <p className="about-body-text">The Modern Freelancer Hub is a digital content project covering four high-demand freelancing skills: Graphic Design, Content Writing, Video Editing, and Social Media Management.</p>
      <p className="about-body-text">All content is written from a first-person perspective based on real experiences, specific numbers, and honest outcomes. The target audience is students, office workers, and anyone exploring digital income streams.</p>
      <p className="about-body-text">All 15 posts were published between March 17 and April 1, 2026. Each post meets the 300-word minimum requirement and is written to be genuinely useful rather than keyword-stuffed or AI-generated.</p>
    </div>
  );
}

/* ─── FOOTER ─────────────────────────────────────────────── */
function Footer({ onNav, onAbout }) {
  return (
    <footer>
      <div className="footer-team-strip">
        <div className="footer-team-inner">
          <span className="footer-team-label">DMMM Assign. 2 —</span>
          {TEAM.map((m, i) => (
            <div key={i} className="footer-team-pill">
              <strong>{m.name}</strong>
              <span>{m.roll}</span>
            </div>
          ))}
          <button onClick={onAbout} style={{marginLeft:"auto",fontFamily:"var(--font-ui)",fontSize:12,color:"var(--accent)",fontWeight:600,padding:"4px 10px",borderRadius:6,transition:"background 0.15s"}}
            onMouseOver={e=>e.currentTarget.style.background="var(--bg-elevated)"}
            onMouseOut={e=>e.currentTarget.style.background="transparent"}>
            Identity Verifier →
          </button>
        </div>
      </div>
      <div className="footer-main">
        <div className="footer-inner">
          <div>
            <div className="footer-brand">The Modern <span>Freelancer</span> Hub</div>
            <div className="footer-tagline">15 original posts · DMMM Assignment 2 · 2026</div>
          </div>
          <div className="footer-links">
            {CATS.map(c => (
              <button key={c.id} className="footer-link" onClick={() => onNav("cat", c.id)}>{c.name}</button>
            ))}
            <button className="footer-link" onClick={onAbout}>About</button>
          </div>
          <div className="footer-copy">© 2026 The Modern Freelancer Hub</div>
        </div>
      </div>
    </footer>
  );
}

/* ─── APP ────────────────────────────────────────────────── */
function App() {
  const [view, setView] = useState({ page: "home", post: null, cat: null });
  const [searchOpen, setSearchOpen] = useState(false);
  const [dark, setDark] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  }, [dark]);

  // Cmd/Ctrl+K shortcut
  useEffect(() => {
    const handler = e => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); setSearchOpen(true); }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const openPost  = post  => setView({ page: "post",  post, cat: null });
  const openCat   = catId => setView({ page: "cat",   post: null, cat: catId });
  const goHome    = ()    => setView({ page: "home",  post: null, cat: null });
  const goAbout   = ()    => setView({ page: "about", post: null, cat: "about" });
  const navHandler = (type, id) => { if (type === "cat") openCat(id); };

  const isPost = view.page === "post";

  return (
    <div style={{ display:"flex", flexDirection:"column", minHeight:"100vh" }}>
      {isPost && <ReadingProgress />}
      {searchOpen && <SearchOverlay onClose={() => setSearchOpen(false)} onOpenPost={p => { openPost(p); setSearchOpen(false); }} />}
      <Navbar
        currentCat={view.cat} onHome={goHome} onCat={openCat}
        onSearch={() => setSearchOpen(true)} onAbout={goAbout}
        dark={dark} setDark={setDark}
      />
      <main style={{ flex:1 }}>
        {view.page === "home"  && <HomePage onOpenPost={openPost} onCat={openCat} />}
        {view.page === "post"  && view.post && <PostPage post={view.post} onBack={goHome} onOpenPost={openPost} />}
        {view.page === "cat"   && view.cat && view.cat !== "about" && <CategoryPage catId={view.cat} onBack={goHome} onOpenPost={openPost} />}
        {view.page === "about" && <AboutPage onHome={goHome} />}
      </main>
      <Footer onNav={navHandler} onAbout={goAbout} />
      <BackToTop />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
