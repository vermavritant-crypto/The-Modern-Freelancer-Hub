<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Modern Freelancer Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FAF8F5;
      --bg-card: #FFFFFF;
      --text: #1A1916;
      --muted: #7A7066;
      --faint: #C5BFB7;
      --border: #EAE5DE;
      --accent: #B87A0A;
      --accent-hover: #9A6408;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Source Serif 4', Georgia, serif;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 17px; line-height: 1.75; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    input { font-family: inherit; }
    #root { min-height: 100vh; display: flex; flex-direction: column; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }
    ::selection { background: #F0E8D5; }

    /* category badge colors */
    .badge-graphic-design  { color: #5B30A6; background: #EDE7FB; }
    .badge-content-writing { color: #1A6B44; background: #E4F4EC; }
    .badge-video-editing   { color: #B82020; background: #FBEAEA; }
    .badge-social-media    { color: #1056A0; background: #E4EFF9; }

    .dot-graphic-design  { background: #7B50C8; }
    .dot-content-writing { background: #22844F; }
    .dot-video-editing   { background: #CC2A2A; }
    .dot-social-media    { background: #1868C0; }

    /* navbar */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250, 248, 245, 0.94);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .navbar-inner {
      max-width: 1160px; margin: 0 auto;
      padding: 0 24px;
      height: 62px;
      display: flex; align-items: center; gap: 0;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.15rem; font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo span { color: var(--accent); }
    .nav-links {
      display: flex; align-items: center; gap: 0;
      margin-left: 36px; flex: 1;
    }
    .nav-link {
      font-family: var(--font-ui);
      font-size: 13px; font-weight: 500;
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); background: var(--border); }
    .nav-link.active { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .search-btn {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-ui); font-size: 13px; font-weight: 500;
      color: var(--muted); padding: 7px 12px;
      border-radius: 6px; border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .search-btn:hover { color: var(--text); border-color: var(--faint); }

    /* search overlay */
    .search-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(26, 25, 22, 0.5);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 80px;
    }
    .search-box {
      background: var(--bg-card);
      border-radius: 14px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.18);
      width: 100%; max-width: 580px;
      margin: 0 24px;
      overflow: hidden;
    }
    .search-input-row {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .search-input-row input {
      flex: 1; border: none; outline: none;
      font-family: var(--font-body); font-size: 17px;
      background: transparent; color: var(--text);
    }
    .search-input-row input::placeholder { color: var(--faint); }
    .search-results { padding: 8px 0; max-height: 360px; overflow-y: auto; }
    .search-result-item {
      display: flex; flex-direction: column; gap: 2px;
      padding: 12px 20px; cursor: pointer; transition: background 0.1s;
    }
    .search-result-item:hover { background: var(--bg); }
    .search-result-title { font-family: var(--font-body); font-size: 15px; font-weight: 600; color: var(--text); }
    .search-result-cat { font-family: var(--font-ui); font-size: 12px; color: var(--muted); }
    .search-empty { padding: 24px 20px; color: var(--muted); font-family: var(--font-ui); font-size: 14px; }

    /* hero */
    .hero { max-width: 1160px; margin: 0 auto; padding: 52px 24px 0; }
    .hero-eyebrow {
      font-family: var(--font-ui); font-size: 11px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .hero-eyebrow::before {
      content: ''; display: block; width: 24px; height: 1px; background: var(--accent);
    }
    .hero-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 48px; align-items: start;
    }
    @media (max-width: 720px) { .hero-grid { grid-template-columns: 1fr; gap: 32px; } }
    .hero-left {}
    .hero-category-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 5px 10px; border-radius: 4px;
      margin-bottom: 18px;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(1.7rem, 3.5vw, 2.4rem);
      font-weight: 700; line-height: 1.22;
      letter-spacing: -0.015em;
      color: var(--text); margin-bottom: 16px;
    }
    .hero-title:hover { color: var(--accent); cursor: pointer; transition: color 0.2s; }
    .hero-excerpt {
      font-size: 1.05rem; color: var(--muted); line-height: 1.7;
      margin-bottom: 24px;
    }
    .hero-meta {
      display: flex; align-items: center; gap: 12px;
      font-family: var(--font-ui); font-size: 13px; color: var(--muted);
    }
    .hero-meta .dot { color: var(--faint); }
    .hero-read-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-ui); font-size: 13px; font-weight: 600;
      color: var(--accent); padding: 10px 0;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
      letter-spacing: 0.03em;
    }
    .hero-read-btn:hover { border-color: var(--accent); }

    .hero-right {
      border-left: 1px solid var(--border);
      padding-left: 48px;
    }
    @media (max-width: 720px) { .hero-right { border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: 32px; } }
    .sidebar-heading {
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--faint); margin-bottom: 20px;
    }
    .sidebar-list { display: flex; flex-direction: column; gap: 0; }
    .sidebar-item {
      display: flex; gap: 16px; padding: 14px 0;
      border-bottom: 1px solid var(--border); cursor: pointer;
      transition: opacity 0.15s;
    }
    .sidebar-item:last-child { border-bottom: none; }
    .sidebar-item:hover { opacity: 0.72; }
    .sidebar-num {
      font-family: var(--font-display); font-size: 1.5rem; font-weight: 400;
      color: var(--border); line-height: 1; flex-shrink: 0; width: 28px;
    }
    .sidebar-item-text { flex: 1; }
    .sidebar-item-cat {
      font-family: var(--font-ui); font-size: 11px; font-weight: 600;
      letter-spacing: 0.07em; text-transform: uppercase;
      margin-bottom: 4px;
    }
    .sidebar-item-title {
      font-family: var(--font-body); font-size: 15px; font-weight: 600;
      line-height: 1.35; color: var(--text);
    }
    .sidebar-item-meta {
      font-family: var(--font-ui); font-size: 12px; color: var(--faint); margin-top: 4px;
    }

    /* divider */
    .divider {
      max-width: 1160px; margin: 48px auto 0; padding: 0 24px;
      display: flex; align-items: center; gap: 20px;
    }
    .divider-label {
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
      white-space: nowrap;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }

    /* posts grid */
    .posts-section { max-width: 1160px; margin: 0 auto; padding: 32px 24px 64px; }
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
    }
    .post-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 26px 24px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s;
      display: flex; flex-direction: column;
    }
    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(26,25,22,0.07);
      border-color: var(--faint);
    }
    .post-card-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 4px 9px; border-radius: 4px;
      margin-bottom: 16px; align-self: flex-start;
    }
    .post-card-title {
      font-family: var(--font-display); font-size: 1.18rem; font-weight: 600;
      line-height: 1.3; letter-spacing: -0.01em;
      color: var(--text); margin-bottom: 10px;
      flex: 1;
    }
    .post-card-excerpt {
      font-size: 14px; color: var(--muted); line-height: 1.6;
      margin-bottom: 18px;
    }
    .post-card-meta {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-ui); font-size: 12px; color: var(--faint);
      border-top: 1px solid var(--border); padding-top: 16px;
      margin-top: auto;
    }
    .post-card-meta-dot { color: var(--border); }

    /* category page */
    .cat-page { max-width: 1160px; margin: 0 auto; padding: 52px 24px 64px; }
    .cat-page-header { margin-bottom: 40px; }
    .cat-page-eyebrow {
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px;
    }
    .cat-page-title {
      font-family: var(--font-display); font-size: 2.2rem; font-weight: 700;
      color: var(--text); margin-bottom: 10px; letter-spacing: -0.015em;
    }
    .cat-page-desc { font-size: 1.05rem; color: var(--muted); max-width: 540px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-ui); font-size: 13px; font-weight: 500;
      color: var(--muted); padding: 8px 14px;
      border: 1px solid var(--border); border-radius: 7px;
      transition: all 0.15s; margin-bottom: 32px;
    }
    .back-btn:hover { color: var(--text); border-color: var(--faint); }

    /* post page */
    .post-page { max-width: 1160px; margin: 0 auto; padding: 40px 24px 80px; }
    .post-layout {
      display: grid; grid-template-columns: 1fr 340px;
      gap: 64px; align-items: start;
    }
    @media (max-width: 860px) { .post-layout { grid-template-columns: 1fr; } }
    .post-article {}
    .post-article-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 4px 9px; border-radius: 4px;
      margin-bottom: 20px;
    }
    .post-article-title {
      font-family: var(--font-display);
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      font-weight: 700; line-height: 1.18;
      letter-spacing: -0.02em; color: var(--text);
      margin-bottom: 20px;
    }
    .post-article-meta {
      display: flex; align-items: center; gap: 14px;
      font-family: var(--font-ui); font-size: 13px; color: var(--muted);
      margin-bottom: 36px; padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
    .post-article-meta .author-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #F0E8D5; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--accent);
      flex-shrink: 0;
    }
    .post-body { font-size: 17px; line-height: 1.8; color: var(--text); }
    .post-body p { margin-bottom: 1.4em; }
    .post-body h2 { font-family: var(--font-display); font-size: 1.45rem; font-weight: 700; color: var(--text); margin: 2em 0 0.7em; letter-spacing: -0.01em; }
    .post-body h3 { font-family: var(--font-display); font-size: 1.18rem; font-weight: 600; color: var(--text); margin: 1.6em 0 0.5em; }
    .post-body strong { font-weight: 600; color: var(--text); }
    .post-body em { font-style: italic; }
    .post-body ul, .post-body ol { margin: 0 0 1.4em 1.4em; }
    .post-body li { margin-bottom: 0.5em; }
    .post-body blockquote {
      border-left: 3px solid var(--accent); padding-left: 20px;
      margin: 1.8em 0; font-style: italic; color: var(--muted);
    }
    .post-body hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

    .post-sidebar { position: sticky; top: 80px; }
    .sidebar-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px;
      margin-bottom: 20px;
    }
    .sidebar-card-title {
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint);
      margin-bottom: 16px;
    }
    .related-post-item {
      padding: 12px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: opacity 0.15s;
    }
    .related-post-item:last-child { border-bottom: none; }
    .related-post-item:hover { opacity: 0.7; }
    .related-post-title { font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 4px; }
    .related-post-meta { font-family: var(--font-ui); font-size: 12px; color: var(--faint); }

    /* category nav tabs */
    .cat-tabs {
      max-width: 1160px; margin: 0 auto; padding: 20px 24px 0;
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .cat-tab {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--font-ui); font-size: 13px; font-weight: 500;
      padding: 8px 14px; border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--muted); background: var(--bg-card);
      transition: all 0.15s; cursor: pointer;
    }
    .cat-tab:hover { border-color: var(--faint); color: var(--text); }
    .cat-tab.active { border-color: transparent; color: var(--bg-card); }
    .cat-tab-dot { width: 8px; height: 8px; border-radius: 50%; }
    .cat-tab.active-graphic-design  { background: #7B50C8; border-color: #7B50C8; }
    .cat-tab.active-content-writing { background: #22844F; border-color: #22844F; }
    .cat-tab.active-video-editing   { background: #CC2A2A; border-color: #CC2A2A; }
    .cat-tab.active-social-media    { background: #1868C0; border-color: #1868C0; }

    /* footer */
    .footer {
      margin-top: auto;
      border-top: 1px solid var(--border);
      background: var(--bg-card);
      padding: 40px 24px;
    }
    .footer-inner {
      max-width: 1160px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center; gap: 24px;
      flex-wrap: wrap;
    }
    .footer-brand { font-family: var(--font-display); font-weight: 700; font-size: 1rem; }
    .footer-brand span { color: var(--accent); }
    .footer-tagline { font-family: var(--font-ui); font-size: 13px; color: var(--muted); margin-top: 4px; }
    .footer-links {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .footer-link {
      font-family: var(--font-ui); font-size: 13px; color: var(--muted);
      transition: color 0.15s;
    }
    .footer-link:hover { color: var(--text); }
    .footer-copy { font-family: var(--font-ui); font-size: 12px; color: var(--faint); }

    /* utility */
    .text-accent { color: var(--accent); }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }
  </style>
</head>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

/* ─── DATA ─────────────────────────────────────────────────────────── */

const CATS = [
  { id: "graphic-design",  name: "Graphic Design",   desc: "Earning with visual skills — from client logos to passive template income." },
  { id: "content-writing", name: "Content Writing",  desc: "The honest path from SEO content mills to high-ticket copywriting clients." },
  { id: "video-editing",   name: "Video Editing",    desc: "Short-form, long-form, retainers — how video editors are actually building income." },
  { id: "social-media",    name: "Social Media",     desc: "Strategy, community management, and what social media management really looks like day to day." },
];

const POSTS = [
  {
    id: 1, category: "graphic-design", featured: true,
    title: "How I Made My First ₹10,000 Selling Templates — Without a Single Client",
    excerpt: "I kept waiting to feel 'ready'. Three months later I finally just started. The first sale came in on a random Tuesday.",
    date: "March 28, 2025", readTime: "7 min",
    content: `The first thing nobody tells you about selling design templates is that you'll spend more time on your product listings than on the actual designs.

I learned this the hard way. I made 14 Instagram templates in one weekend — honestly pretty decent work — uploaded them to Creative Market with blurry screenshots and a description that said something like "modern social media templates, perfect for brands." Three weeks later, zero sales.

The problem wasn't the designs.

I knew this because I'd posted the same templates as free downloads in a couple of Facebook groups and got over 200 downloads in 48 hours. People wanted the templates. My listing just didn't give them a reason to pay for them.

## What actually changed things

I spent a day studying the top-selling template shops on Creative Market. Not to copy them — just to understand what they were doing. The answer was pretty boring: good mockup images and specific product descriptions.

"14 Instagram post templates for food bloggers and recipe creators" beats "social media templates for brands" every single time. Because the food blogger searching Creative Market already knows she's a food blogger. She doesn't need to decide whether the product applies to her — your title has already confirmed it does.

I rewrote all my listings. I took proper screenshots of the templates on a fake Instagram grid I set up in Figma. I repriced them from ₹299 to ₹799 — which sounds counterintuitive, but lower-priced templates often get skipped because buyers assume they're lower quality.

The first sale came in on a Tuesday, 11 days after relisting. ₹799. I remember sitting there refreshing my email.

By the end of that month, I had ₹10,400 in sales from six template packs.

## The tools I actually used

Everything was Canva Pro, not Photoshop or Illustrator. I know that raises eyebrows in design communities, but for selling editable templates, Canva-compatible files are actually a selling point. Most people buying templates plan to customize them in Canva anyway. Meeting them where they are isn't cutting corners — it's just smart product design.

My process: pick a specific audience, look at what content they actually post, design templates that solve their specific problems. Wedding photographers, for example, hate designing quote posts. They want clean text layouts that don't feel like Canva defaults but also don't require design knowledge to customize. That's a real, specific pain point.

## The part nobody talks about

Passive income from templates is real but slow to build. That first ₹10,000 month dropped to ₹4,000 the following month because I wasn't adding new packs. The shops making consistent money are uploading something new every one or two weeks, building a catalog, and benefiting from compounding discovery.

I'm at 22 packs now. Some months it's ₹6,000, some months it's ₹20,000. Inconsistent, but also not zero, and the work is already done.

If I were starting again, I'd do three things differently: niche down harder from the start, invest more time in mockup photography (a phone photo of a tablet showing your template sells better than a flat screenshot), and I'd start on Etsy before Creative Market — the organic traffic is genuinely better for new sellers.

That's it. No secret formula. Just better listings and a narrow enough niche to be found.`
  },
  {
    id: 2, category: "graphic-design", featured: false,
    title: "Fiverr vs Upwork for Graphic Designers: What 6 Months Taught Me",
    excerpt: "Both platforms work. They attract completely different kinds of buyers — and knowing that upfront saves a lot of headaches.",
    date: "March 15, 2025", readTime: "5 min",
    content: `Six months on both platforms. Here's the honest version.

**Fiverr** attracts buyers who want fixed prices and fast delivery. This works fine once you've set your rates correctly — but a lot of new designers price themselves badly. If you're charging ₹800 for a logo, you're making maybe ₹250 an hour on a good day. And it often isn't a good day.

The upside: once your gig has 30-40 reviews, Fiverr's search algorithm does a lot of work for you. I got to 50 reviews and orders started arriving without me actively pitching.

      <div className="search-box" onClick={e => e.stopPropagation()}>
        <div className="search-input-row">
          <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" style={{ color: "#C5BFB7", flexShrink: 0 }}>
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)}
            placeholder="Search posts, topics, categories..." />
          <button onClick={onClose} style={{ color: "#C5BFB7", fontSize: 18, lineHeight: 1 }}>✕</button>
        </div>
        <div className="search-results">
          {q && results.length === 0 && (
            <div className="search-empty">No results for "{q}"</div>
          )}
          {results.map(p => (
            <div key={p.id} className="search-result-item" onClick={() => { onOpenPost(p); onClose(); }}>
              <div className="search-result-title">{p.title}</div>
              <div className="search-result-cat">{getCat(p.category)?.name} · {p.readTime}</div>
            </div>
          ))}
          {!q && (
            <div className="search-empty">Start typing to search all posts…</div>
          )}
        </div>
      </div>
    </div>
  );
}

function Navbar({ currentCat, onHome, onCat, onSearch }) {
  return (
    <nav className="navbar">
      <div className="navbar-inner">
        <button className="logo" onClick={onHome} style={{ cursor: "pointer" }}>
          The Modern <span>Freelancer</span> Hub
        </button>
        <div className="nav-links">
          {CATS.map(c => (
            <button key={c.id} className={`nav-link${currentCat === c.id ? " active" : ""}`}
              onClick={() => onCat(c.id)}>
              {c.name}
            </button>
          ))}
        </div>
        <div className="nav-right">
          <button className="search-btn" onClick={onSearch}>
            <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            Search
          </button>
        </div>
      </div>
    </nav>
  );
}

function PostCard({ post, onOpen }) {
  return (
    <div className="post-card" onClick={() => onOpen(post)}>
      <span className={`post-card-badge badge-${post.category}`}>
        {getCat(post.category)?.name}
      </span>
      <div className="post-card-title">{post.title}</div>
      <div className="post-card-excerpt">{post.excerpt}</div>
      <div className="post-card-meta">
        <span>{post.date}</span>
        <span className="post-card-meta-dot">·</span>
        <span>{post.readTime} read</span>
      </div>
    </div>
  );
}

function renderContent(text) {
  const lines = text.trim().split("\n");
  const elements = [];
  let i = 0, key = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith("## ")) {
      elements.push(<h2 key={key++}>{line.slice(3)}</h2>);
    } else if (line.startsWith("### ")) {
      elements.push(<h3 key={key++}>{line.slice(4)}</h3>);
    } else if (line === "---") {
      elements.push(<hr key={key++} />);
    } else if (line.trim() === "") {
      // skip
    } else {
      // parse inline formatting
      const parsed = parseInline(line, key++);
      elements.push(<p key={key++}>{parsed}</p>);
    }
    i++;
  }
  return elements;
}

function parseInline(text, key) {
  const parts = [];
  let remaining = text;
  let idx = 0;
  while (remaining.length > 0) {
    const boldMatch = remaining.match(/\*\*(.+?)\*\*/);
    const italicMatch = remaining.match(/_(.+?)_/);
    const first = boldMatch && (!italicMatch || boldMatch.index <= italicMatch.index) ? boldMatch : italicMatch;
    if (!first) { parts.push(remaining); break; }
    if (first.index > 0) parts.push(remaining.slice(0, first.index));
    if (first === boldMatch) parts.push(<strong key={idx++}>{boldMatch[1]}</strong>);
    else parts.push(<em key={idx++}>{italicMatch[1]}</em>);
    remaining = remaining.slice(first.index + first[0].length);
  }
  return parts;
}

function PostPage({ post, allPosts, onBack, onOpenPost }) {
  useEffect(() => { window.scrollTo({ top: 0, behavior: "smooth" }); }, [post.id]);

  const related = allPosts.filter(p => p.id !== post.id && p.category === post.category).slice(0, 3);
  const otherFeatured = allPosts.filter(p => p.id !== post.id && p.featured).slice(0, 3);

  return (
    <div className="post-page">
      <button className="back-btn" onClick={onBack}>
        ← Back
      </button>
      <div className="post-layout">
        <article className="post-article">
          <span className={`post-article-badge badge-${post.category}`}>
            {getCat(post.category)?.name}
          </span>
          <h1 className="post-article-title">{post.title}</h1>
          <div className="post-article-meta">
            <div className="author-avatar">Z</div>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14, color: "#1A1916" }}>Zara</div>
              <div style={{ fontSize: 12 }}>{post.date} · {post.readTime} read</div>
            </div>
          </div>
          <div className="post-body">
            {renderContent(post.content)}
          </div>
        </article>
        <aside className="post-sidebar">
          {related.length > 0 && (
            <div className="sidebar-card">
              <div className="sidebar-card-title">More in {getCat(post.category)?.name}</div>
              {related.map(p => (
                <div key={p.id} className="related-post-item" onClick={() => onOpenPost(p)}>
                  <div className="related-post-title">{p.title}</div>
                  <div className="related-post-meta">{p.readTime} read</div>
                </div>
              ))}
            </div>
          )}
          {otherFeatured.length > 0 && (
            <div className="sidebar-card">
              <div className="sidebar-card-title">Featured Posts</div>
              {otherFeatured.map(p => (
                <div key={p.id} className="related-post-item" onClick={() => onOpenPost(p)}>
                  <span className={`post-card-badge badge-${p.category}`} style={{ fontSize: 10, padding: "3px 7px", marginBottom: 4 }}>
                    {getCat(p.category)?.name}
                  </span>
                  <div className="related-post-title">{p.title}</div>
                  <div className="related-post-meta">{p.readTime} read</div>
                </div>
              ))}
            </div>
          )}
          <div className="sidebar-card">
            <div className="sidebar-card-title">About</div>
            <p style={{ fontSize: 14, color: "#7A7066", lineHeight: 1.65 }}>
              The Modern Freelancer Hub is written by Zara — a digital freelancer sharing real, earned knowledge about building income from creative skills online.
            </p>
          </div>
        </aside>
      </div>
    </div>
  );
}

function CategoryPage({ catId, allPosts, onBack, onOpenPost }) {
  const cat = getCat(catId);
  const posts = allPosts.filter(p => p.category === catId);
  useEffect(() => { window.scrollTo({ top: 0 }); }, [catId]);
  return (
    <div className="cat-page">
      <button className="back-btn" onClick={onBack}>← Back to home</button>
      <div className="cat-page-header">
        <div className="cat-page-eyebrow">Category</div>
        <h1 className="cat-page-title">{cat?.name}</h1>
        <p className="cat-page-desc">{cat?.desc}</p>
      </div>
      <div className="posts-grid">
        {posts.map(p => <PostCard key={p.id} post={p} onOpen={onOpenPost} />)}
      </div>
    </div>
  );
}

function HomePage({ posts, onOpenPost, onCat }) {
  const featuredPosts = posts.filter(p => p.featured);
  const hero = featuredPosts[0];
  const sidebarFeatured = featuredPosts.slice(1, 4);
  const recentAll = posts.filter(p => !p.featured).slice(0, 9);

  return (
    <>
      {/* Hero */}
      <div className="hero">
        <div className="hero-eyebrow">The Modern Freelancer Hub</div>
        <div className="hero-grid">
          <div className="hero-left">
            <BadgePill categoryId={hero.category} />
            <h2 className="hero-title" onClick={() => onOpenPost(hero)}>{hero.title}</h2>
            <p className="hero-excerpt">{hero.excerpt}</p>
            <div className="hero-meta">
              <span>By Zara</span>
              <span className="dot">·</span>
              <span>{hero.date}</span>
              <span className="dot">·</span>
              <span>{hero.readTime} read</span>
            </div>
            <button className="hero-read-btn" onClick={() => onOpenPost(hero)}>
              Read article →
            </button>
          </div>
          <div className="hero-right">
            <div className="sidebar-heading">Also featured</div>
            <div className="sidebar-list">
              {sidebarFeatured.map((p, i) => (
                <div key={p.id} className="sidebar-item" onClick={() => onOpenPost(p)}>
                  <div className="sidebar-num">0{i + 1}</div>
                  <div className="sidebar-item-text">
                    <div className={`sidebar-item-cat badge-${p.category}`}
                      style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.07em", textTransform: "uppercase", padding: "3px 7px", borderRadius: 3, display: "inline-block", marginBottom: 6 }}>
                      {getCat(p.category)?.name}
                    </div>
                    <div className="sidebar-item-title">{p.title}</div>
                    <div className="sidebar-item-meta">{p.readTime} read</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Category Tabs */}
      <div className="cat-tabs">
        {CATS.map(c => (
          <button key={c.id} className="cat-tab" onClick={() => onCat(c.id)}>
            <span className={`cat-tab-dot dot-${c.id}`} />
            {c.name}
          </button>
        ))}
      </div>

      {/* Divider */}
      <div className="divider">
        <span className="divider-label">Latest posts</span>
        <div className="divider-line" />
      </div>

      {/* Posts Grid */}
      <div className="posts-section">
        <div className="posts-grid">
          {recentAll.map(p => <PostCard key={p.id} post={p} onOpen={onOpenPost} />)}
        </div>
      </div>
    </>
  );
}

function Footer({ onNav }) {
  return (
    <footer className="footer">
      <div className="footer-inner">
        <div>
          <div className="footer-brand">The Modern <span>Freelancer</span> Hub</div>
          <div className="footer-tagline">Real guides for digital freelancers. Written by Zara.</div>
        </div>
        <div className="footer-links">
          {CATS.map(c => (
            <button key={c.id} className="footer-link" onClick={() => onNav("cat", c.id)}>
              {c.name}
            </button>
          ))}
        </div>
        <div className="footer-copy">© 2025 The Modern Freelancer Hub</div>
      </div>
    </footer>
  );
}

/* ─── APP ─────────────────────────────────────────────────────────────── */
function App() {
  const [view, setView] = useState({ page: "home", post: null, cat: null });
  const [searchOpen, setSearchOpen] = useState(false);

  const openPost = post => setView({ page: "post", post, cat: null });
  const openCat  = catId => setView({ page: "cat", post: null, cat: catId });
  const goHome   = () => setView({ page: "home", post: null, cat: null });

  const navHandler = (type, id) => {
    if (type === "home") goHome();
    else if (type === "cat") openCat(id);
  };

  return (
    <div id="app-root" style={{ display: "flex", flexDirection: "column", minHeight: "100vh" }}>
      {searchOpen && (
        <SearchOverlay
          posts={POSTS}
          onClose={() => setSearchOpen(false)}
          onOpenPost={p => { openPost(p); setSearchOpen(false); }}
        />
      )}
      <Navbar
        currentCat={view.cat}
        onHome={goHome}
        onCat={openCat}
        onSearch={() => setSearchOpen(true)}
      />
      <main style={{ flex: 1 }}>
        {view.page === "home" && (
          <HomePage posts={POSTS} onOpenPost={openPost} onCat={openCat} />
        )}
        {view.page === "post" && view.post && (
          <PostPage
            post={view.post}
            allPosts={POSTS}
            onBack={() => window.history.length > 1 ? setView(prev => ({ ...prev, page: "home" })) : goHome()}
            onOpenPost={openPost}
          />
        )}
        {view.page === "cat" && view.cat && (
          <CategoryPage
            catId={view.cat}
            allPosts={POSTS}
            onBack={goHome}
            onOpenPost={openPost}
          />
        )}
      </main>
      <Footer onNav={navHandler} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
